name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: |
          dart compile exe bin/inbox.dart -o dong-inbox
          codesign -s - dong-inbox
          chmod +x dong-inbox

      - name: Create archives
        run: |
          ARCHIVE="dong-inbox-macos-$(uname -m).tar.gz"
          tar czf "$ARCHIVE" dong-inbox
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARCHIVE }}
          generate_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
